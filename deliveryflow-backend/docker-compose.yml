version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: df-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: deliveryflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: df-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@deliveryflow.io
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20.0-community
    container_name: df-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    restart: unless-stopped

volumes:
  postgres-data:
  neo4j-data:
  neo4j-logs:

