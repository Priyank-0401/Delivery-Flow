server:
  port: 8080

spring:
  application:
    name: deliveryflow-backend
    
  datasource:
    url: jdbc:postgresql://localhost:5432/deliveryflow
    username: root
    password: rootpassword
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.deliveryflow: DEBUG
